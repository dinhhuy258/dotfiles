interval: 60
reminder_interval: 60
sound:
  default: ~/Workspace/dotfiles/pr-monitor/default.wav
  ready_to_merge: ~/Workspace/dotfiles/pr-monitor/success.wav
  merged: ~/Workspace/dotfiles/pr-monitor/success.wav
comments:
  ignore_users:
    - sonarqubecloud
hooks:
  ci_failed:
    - command: "claude --worktree -- '/gh-fix-ci PR #{pr_number} in {repo}'"
      confirm: true
      interactive: true
      confirm_message: "Fix with Claude?"
  comment:
    - command: "claude --worktree -- '/gh-address-comments PR #{pr_number} in {repo}'"
      confirm: true
      interactive: true
      confirm_message: "Address with Claude?"
